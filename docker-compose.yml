services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: bhante
      POSTGRES_PASSWORD: bhante
      POSTGRES_DB: bhante
    ports:
      - "5433:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bhante"]
      interval: 5s
      timeout: 3s
      retries: 10
